<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <title>Aangan logo</title>
  <desc>Aangan app logo featuring a stylized courtyard arch with a dot motif, wordmark in deep teal, and Devanagari subtitle</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&amp;family=Hanken+Grotesk:wght@300;400&amp;display=swap');
      .logo-word { font-family: 'Bricolage Grotesque', Georgia, serif; font-weight: 700; font-size: 72px; fill: #0F5E4A; letter-spacing: -2px; }
      .logo-deva { font-family: 'Hanken Grotesk', sans-serif; font-weight: 400; font-size: 20px; fill: #888780; letter-spacing: 4px; }
      .logo-tag  { font-family: 'Hanken Grotesk', sans-serif; font-weight: 300; font-size: 14px; fill: #B4B2A9; letter-spacing: 2px; }
    </style>
    <rect id="bg" width="680" height="420" fill="#ffffff"/>
  </defs>

  <rect width="680" height="420" fill="#ffffff"/>

  <!-- Outer circle ring -->
  <circle cx="170" cy="195" r="115" fill="none" stroke="#0F6E56" stroke-width="3" opacity="0.18"/>
  <circle cx="170" cy="195" r="108" fill="none" stroke="#0F6E56" stroke-width="1" opacity="0.12"/>
  <circle cx="170" cy="195" r="104" fill="#E1F5EE" opacity="0.55"/>

  <!-- Arch -->
  <path d="M118 258 L118 200 Q118 148 170 148 Q222 148 222 200 L222 258 Z" fill="#0F6E56" opacity="0.92"/>
  <path d="M132 258 L132 206 Q132 162 170 162 Q208 162 208 206 L208 258 Z" fill="#E1F5EE" opacity="0.6"/>
  <path d="M140 258 L140 209 Q140 170 170 170 Q200 170 200 209 L200 258 Z" fill="#E8650A" opacity="0.88"/>

  <!-- Central dot -->
  <circle cx="170" cy="222" r="14" fill="#FAEEDA"/>
  <circle cx="170" cy="222" r="8"  fill="#E8650A"/>
  <circle cx="170" cy="222" r="3"  fill="#ffffff"/>

  <!-- Crown dots -->
  <circle cx="170" cy="152" r="3.5" fill="#0F6E56" opacity="0.7"/>
  <circle cx="151" cy="158" r="2.5" fill="#0F6E56" opacity="0.5"/>
  <circle cx="189" cy="158" r="2.5" fill="#0F6E56" opacity="0.5"/>
  <circle cx="137" cy="173" r="2"   fill="#0F6E56" opacity="0.35"/>
  <circle cx="203" cy="173" r="2"   fill="#0F6E56" opacity="0.35"/>

  <!-- Base -->
  <rect x="108" y="255" width="124" height="9" rx="3" fill="#0F6E56" opacity="0.75"/>
  <rect x="118" y="262" width="104" height="6" rx="2" fill="#0A4F3A" opacity="0.5"/>

  <!-- Pillars -->
  <rect x="104" y="215" width="14" height="47" rx="3" fill="#0F6E56" opacity="0.25"/>
  <rect x="222" y="215" width="14" height="47" rx="3" fill="#0F6E56" opacity="0.25"/>

  <!-- Warm scatter dots -->
  <circle cx="138" cy="240" r="2" fill="#E8650A" opacity="0.35"/>
  <circle cx="202" cy="240" r="2" fill="#E8650A" opacity="0.35"/>
  <circle cx="144" cy="248" r="1.5" fill="#E8650A" opacity="0.25"/>
  <circle cx="196" cy="248" r="1.5" fill="#E8650A" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="315" y="226" class="logo-word" text-anchor="middle">aangan</text>
  <text x="315" y="263" class="logo-deva" text-anchor="middle">आँगन</text>
  <line x1="248" y1="285" x2="382" y2="285" stroke="#D3D1C7" stroke-width="0.75"/>
  <text x="315" y="305" class="logo-tag" text-anchor="middle">your society. your courtyard.</text>
</svg>
